# GuildMark — NGINX reverse proxy
#
# Cloudflare terminates TLS; this proxy receives plain HTTP on port 80 from
# Cloudflare's edge and routes by subdomain to internal Docker services.
#
# Subdomains:
#   guildmark.co / www.guildmark.co  →  marketplace frontend
#   devdash.guildmark.co             →  admin panel
#   api.guildmark.co                 →  Dart Frog REST API
#   ml-qv.guildmark.co               →  Python ML service  (keep off Cloudflare DNS if internal-only)
#
# Cloudflare IP ranges — keep in sync with https://www.cloudflare.com/ips/

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile   on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Cloudflare real-IP passthrough ────────────────────────────────────────
    # Replace $remote_addr with the actual client IP from CF-Connecting-IP.
    # IPv4
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    # Cloudflare sets X-Forwarded-Proto: https — forward it so the API can
    # issue correct redirect URLs and set Secure cookies.
    proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header   Connection        "";

    # ── Upstreams (Docker internal service names) ─────────────────────────────
    upstream api {
        server api:8080;
        keepalive 32;
    }

    upstream guildmark {
        server guildmark:80;
        keepalive 16;
    }

    upstream devdash {
        server devdash:80;
        keepalive 8;
    }

    # ml upstream is intentionally omitted — it only exists under --profile ml.
    # The server block below uses a variable + resolver so nginx defers DNS
    # lookup to request time and won't crash when the container isn't running.

    # ── guildmark.co / www.guildmark.co — marketplace ─────────────────────────
    server {
        listen      80;
        server_name guildmark.co www.guildmark.co;

        # www → apex canonical redirect.
        if ($host = www.guildmark.co) {
            return 301 https://guildmark.co$request_uri;
        }

        location / {
            proxy_pass         http://guildmark;
            proxy_read_timeout 30s;
        }
    }

    # ── api.guildmark.co — REST API ───────────────────────────────────────────
    server {
        listen      80;
        server_name api.guildmark.co;

        # Disable buffering — keeps SSE and streaming responses live.
        proxy_buffering off;

        # Allow larger payloads (bulk listing CSV, MDM sync, etc.).
        client_max_body_size 10m;

        location / {
            proxy_pass         http://api;
            proxy_read_timeout 120s;  # escrow + ML calls can be slow
        }

        # Webhook routes get a tighter body limit and shorter timeout.
        location /webhooks/ {
            proxy_pass         http://api;
            proxy_read_timeout 30s;
            client_max_body_size 1m;
        }
    }

    # ── devdash.guildmark.co — admin panel ────────────────────────────────────
    server {
        listen      80;
        server_name devdash.guildmark.co;

        # Restrict to known admin IPs in production — uncomment and fill in.
        # allow <YOUR_OFFICE_IP>;
        # allow <YOUR_VPN_CIDR>;
        # deny  all;

        location / {
            proxy_pass         http://devdash;
            proxy_read_timeout 30s;
        }
    }

    # ── ml-qv.guildmark.co — ML service (optional profile) ───────────────────
    # Only active when the ml profile is included: docker compose --profile ml up
    # Uses a variable + Docker's internal resolver (127.0.0.11) so nginx does
    # not try to resolve "ml" at startup — it resolves on each request instead.
    # When ml is not running, requests return 502 rather than crashing nginx.
    server {
        listen      80;
        server_name ml-qv.guildmark.co;

        proxy_read_timeout 120s;  # inference can be slow without GPU

        location / {
            resolver     127.0.0.11 valid=10s ipv6=off;
            set          $ml_upstream ml:8001;
            proxy_pass   http://$ml_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }
    }

    # ── Catch-all — drop unrecognised hosts silently ──────────────────────────
    server {
        listen      80 default_server;
        server_name _;
        return      444;
    }
}
