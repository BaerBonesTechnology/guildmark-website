# GuildMark — NGINX reverse proxy
# Subdomains:
#   guildmark.co / www.guildmark.co  →  financial dashboard  (port 3000)
#   devdash.guildmark.co             →  admin terminal       (port 3001)
#   api.guildmark.co                 →  AstechServer         (port 8080)
#   ml-qv.guildmark.co               →  ML service           (port 8001)
#
# Assumes SSL certs are provisioned by Certbot at the standard Let's Encrypt paths.
# Run: certbot --nginx -d guildmark.co -d www.guildmark.co -d devdash.guildmark.co -d api.guildmark.co -d ml-qv.guildmark.co

# Redirect HTTP → HTTPS for all domains.
server {
    listen 80;
    server_name guildmark.co www.guildmark.co devdash.guildmark.co api.guildmark.co ml-qv.guildmark.co;
    return 301 https://$host$request_uri;
}

# ── guildmark.co + www ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name guildmark.co www.guildmark.co;

    ssl_certificate     /etc/letsencrypt/live/guildmark.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guildmark.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → apex
    if ($host = www.guildmark.co) {
        return 301 https://guildmark.co$request_uri;
    }

    location / {
        proxy_pass         http://localhost:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── devdash.guildmark.co ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name devdash.guildmark.co;

    ssl_certificate     /etc/letsencrypt/live/guildmark.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guildmark.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Block non-admin IPs in production — uncomment and fill in your IP.
    # allow <YOUR_IP>;
    # deny all;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── api.guildmark.co ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.guildmark.co;

    ssl_certificate     /etc/letsencrypt/live/guildmark.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guildmark.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://localhost:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# ── ml-qv.guildmark.co ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ml-qv.guildmark.co;

    ssl_certificate     /etc/letsencrypt/live/guildmark.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guildmark.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ML endpoints can be slow — increase read timeout for inference.
    proxy_read_timeout 60s;

    location / {
        proxy_pass         http://localhost:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
