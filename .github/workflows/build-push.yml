name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master

env:
  REGISTRY: docker.io
  REGISTRY_USERNAME: codingbyjamarcus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: api, context: ./api/bin }
          - { name: ml, context: ./ml-qv }
          - { name: guildmark, context: ./guildmark }
          - { name: devdash, context: ./devdash }
          - { name: nginx, context: ./nginx }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/${{ matrix.service.name }}:buildcache,mode=max
