# GuildMark — Production Docker Compose
# ---------------------------------------------------------------------------
# Builds images locally from source and starts all services.
# Run from the repo root on master branch (start.sh / start.cmd auto-selects
# this file when on master).
#
# Manual usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml up -d --build   # force rebuild
#
# Networking:
#   All services communicate over the internal Docker network.
#   nginx exposes ports 80 + 443 (Cloudflare sits in front for TLS).
# ---------------------------------------------------------------------------

services:

  # ── Postgres ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Dart Frog API ─────────────────────────────────────────────────────────
  api:
    build:
      context:    ./api/bin
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_PORT:                ${API_PORT:-8080}
      DATABASE_URL:            ${DATABASE_URL}
      JWT_ACCESS_SECRET:       ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL_SECONDS:  ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      ML_SERVICE_URL:          ${ML_SERVICE_URL:-http://ml:8001}
      CORS_ORIGIN:             ${CORS_ORIGIN}
      GM_DEBUG:                ${GM_DEBUG:-false}
      SQUARE_ACCESS_TOKEN:     ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_LOCATION_ID:      ${SQUARE_LOCATION_ID:-}
      SQUARE_ENVIRONMENT:      ${SQUARE_ENVIRONMENT:-sandbox}
      GM_WALLET_ACH_ROUTING:   ${GM_WALLET_ACH_ROUTING:-}
      GM_WALLET_ACH_ACCOUNT:   ${GM_WALLET_ACH_ACCOUNT:-}
      JAMF_PRO_CLIENT_ID:      ${JAMF_PRO_CLIENT_ID:-}
      JAMF_PRO_CLIENT_SECRET:  ${JAMF_PRO_CLIENT_SECRET:-}
      INTUNE_TENANT_ID:        ${INTUNE_TENANT_ID:-}
      INTUNE_CLIENT_ID:        ${INTUNE_CLIENT_ID:-}
      INTUNE_CLIENT_SECRET:    ${INTUNE_CLIENT_SECRET:-}
      EBAY_APP_ID:             ${EBAY_APP_ID:-}
      EBAY_CERT_ID:            ${EBAY_CERT_ID:-}
      EBAY_DEV_ID:             ${EBAY_DEV_ID:-}
      BACKMARKET_API_KEY:      ${BACKMARKET_API_KEY:-}
      RESEND_API_KEY:          ${RESEND_API_KEY:-}
      ESCROW_API_KEY:          ${ESCROW_API_KEY:-}
      ESCROW_EMAIL:            ${ESCROW_EMAIL:-}
      ESCROW_ENVIRONMENT:      ${ESCROW_ENVIRONMENT:-sandbox}
      FEDEX_CLIENT_ID:         ${FEDEX_CLIENT_ID:-}
      FEDEX_CLIENT_SECRET:     ${FEDEX_CLIENT_SECRET:-}
      FEDEX_WEBHOOK_SECRET:    ${FEDEX_WEBHOOK_SECRET:-}
      FEDEX_ENVIRONMENT:       ${FEDEX_ENVIRONMENT:-sandbox}

  # ── Python ML service (optional — opt-in with --profile ml) ──────────────
  ml:
    build: ./ml-qv
    profiles: ["ml"]
    restart: unless-stopped
    environment:
      ML_PORT:      ${ML_PORT:-8001}
      ML_MODEL_DIR: /app/model_artifacts
      EBAY_APP_ID:  ${EBAY_APP_ID:-}
      EBAY_CERT_ID: ${EBAY_CERT_ID:-}
      RETRAIN:      ${RETRAIN:-0}
    volumes:
      - ml_artifacts:/app/model_artifacts
    healthcheck:
      test:         ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval:     30s
      timeout:      10s
      retries:      10
      start_period: 120s

  # ── GuildMark marketplace frontend ───────────────────────────────────────
  guildmark:
    build:
      context:    ./guildmark
      dockerfile: Dockerfile
      args:
        VITE_API_URL:   ${VITE_API_URL:-https://api.guildmark.co}
        VITE_IS_LAUNCH: ${VITE_IS_LAUNCH:-true}
        VITE_IS_DEBUG:  ${VITE_IS_DEBUG:-false}
    restart: unless-stopped
    depends_on:
      - api

  # ── DevDash admin panel ───────────────────────────────────────────────────
  devdash:
    build:
      context:    ./devdash
      dockerfile: Dockerfile
      args:
        VITE_API_URL:       ${VITE_API_URL:-https://api.guildmark.co}
        ADMIN_VITE_API_URL: ${ADMIN_VITE_API_URL:-https://api.guildmark.co}
    restart: unless-stopped
    depends_on:
      - api

  # ── NGINX reverse proxy ───────────────────────────────────────────────────
  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - guildmark
      - devdash
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  ml_artifacts:
