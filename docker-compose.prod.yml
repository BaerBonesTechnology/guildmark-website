# GuildMark — Production Docker Compose
# ---------------------------------------------------------------------------
# Each service is exposed on its own port directly to the host.
# Cloudflare routes each subdomain to the correct port via Origin Rules.
#
# Port map:
#   guildmark.co          →  nginx  :444  (fronts the React app)
#   api.guildmark.co      →  api    :8443 (Dart Frog — Cloudflare proxied HTTPS port)
#   devdash.guildmark.co  →  devdash:2053 (Cloudflare proxied HTTPS port)
#
# Cloudflare Origin Rules (free plan):
#   Hostname: api.guildmark.co      → Override origin port: 8443
#   Hostname: devdash.guildmark.co  → Override origin port: 2053
#
# Manual usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml up -d --build   # force rebuild
# ---------------------------------------------------------------------------

services:

  # ── Postgres ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - guildmark-net

  # ── Dart Frog API — exposed on 8443 (Cloudflare proxied HTTPS port) ───────
  api:
    build:
      context:    ./api/bin
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8443:8080"
    environment:
      API_PORT:                ${API_PORT:-8080}
      DATABASE_URL:            ${DATABASE_URL}
      JWT_ACCESS_SECRET:       ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL_SECONDS:  ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      ML_SERVICE_URL:          ${ML_SERVICE_URL:-http://ml:8001}
      APPWRITE_ENDPOINT:       ${APPWRITE_ENDPOINT:-http://appwrite/v1}
      APPWRITE_PROJECT_ID:     ${APPWRITE_PROJECT_ID:-}
      APPWRITE_API_KEY:        ${APPWRITE_API_KEY:-}
      CORS_ORIGIN:             ${CORS_ORIGIN}
      GM_DEBUG:                ${GM_DEBUG:-false}
      SQUARE_ACCESS_TOKEN:     ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_LOCATION_ID:      ${SQUARE_LOCATION_ID:-}
      SQUARE_ENVIRONMENT:      ${SQUARE_ENVIRONMENT:-production}
      SQUARE_APPLICATION_ID:   ${SQUARE_APPLICATION_ID:-none}
      GM_WALLET_ACH_ROUTING:   ${GM_WALLET_ACH_ROUTING:-}
      GM_WALLET_ACH_ACCOUNT:   ${GM_WALLET_ACH_ACCOUNT:-}
      JAMF_PRO_CLIENT_ID:      ${JAMF_PRO_CLIENT_ID:-}
      JAMF_PRO_CLIENT_SECRET:  ${JAMF_PRO_CLIENT_SECRET:-}
      INTUNE_TENANT_ID:        ${INTUNE_TENANT_ID:-}
      INTUNE_CLIENT_ID:        ${INTUNE_CLIENT_ID:-}
      INTUNE_CLIENT_SECRET:    ${INTUNE_CLIENT_SECRET:-}
      EBAY_APP_ID:             ${EBAY_APP_ID:-}
      EBAY_CERT_ID:            ${EBAY_CERT_ID:-}
      EBAY_DEV_ID:             ${EBAY_DEV_ID:-}
      BACKMARKET_API_KEY:      ${BACKMARKET_API_KEY:-}
      RESEND_API_KEY:          ${RESEND_API_KEY:-}
      ESCROW_API_KEY:          ${ESCROW_API_KEY:-}
      ESCROW_EMAIL:            ${ESCROW_EMAIL:-}
      ESCROW_ENVIRONMENT:      ${ESCROW_ENVIRONMENT:-production}
      FEDEX_CLIENT_ID:         ${FEDEX_CLIENT_ID:-}
      FEDEX_CLIENT_SECRET:     ${FEDEX_CLIENT_SECRET:-}
      FEDEX_WEBHOOK_SECRET:    ${FEDEX_WEBHOOK_SECRET:-}
      FEDEX_ENVIRONMENT:       ${FEDEX_ENVIRONMENT:-production}
      ADMIN_CORS_ORIGIN:       ${ADMIN_CORS_ORIGIN:-devdash.guildmark.co}
      ADMIN_AUTH_USER:         ${ADMIN_AUTH_USER:-}
      ADMIN_AUTH_PASS:         ${ADMIN_AUTH_PASS:-}
      PARTNER_CORS_ORIGIN:     ${PARTNER_CORS_ORIGIN:-partner.guildmark.co}
    networks:
      - guildmark-net

  # ── Python ML service (optional — opt-in with --profile ml) ──────────────
  ml:
    build: ./ml-qv
    profiles: ["ml"]
    restart: unless-stopped
    environment:
      ML_PORT:      ${ML_PORT:-8001}
      ML_MODEL_DIR: /app/model_artifacts
      EBAY_APP_ID:  ${EBAY_APP_ID:-}
      EBAY_CERT_ID: ${EBAY_CERT_ID:-}
      RETRAIN:      ${RETRAIN:-0}
    volumes:
      - ml_artifacts:/app/model_artifacts
    healthcheck:
      test:         ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval:     30s
      timeout:      10s
      retries:      10
      start_period: 120s
    networks:
      - guildmark-net

  # ── GuildMark marketplace frontend — served via nginx on 444 ─────────────
  guildmark:
    build:
      context:    ./guildmark
      dockerfile: Dockerfile
      args:
        VITE_API_URL:   ${VITE_API_URL:-https://api.guildmark.co}
        VITE_IS_LAUNCH: ${VITE_IS_LAUNCH:-true}
        VITE_IS_DEBUG:  ${VITE_IS_DEBUG:-false}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - guildmark-net

  # ── DevDash admin panel — exposed on 2053 (Cloudflare proxied HTTPS port) ─
  devdash:
    build:
      context:    ./devdash
      dockerfile: Dockerfile
      args:
        VITE_API_URL:       ${VITE_API_URL:-https://api.guildmark.co}
        ADMIN_VITE_API_URL: ${ADMIN_VITE_API_URL:-https://api.guildmark.co}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "2053:80"
    networks:
      - guildmark-net

  # ── NGINX — serves guildmark.co on 80/444 only ───────────────────────────
  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - guildmark
    ports:
      - "80:80"
      - "444:444"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - guildmark-net

volumes:
  postgres_data:
  ml_artifacts:

# Shared external network — also used by docker-compose.appwrite.yml so the
# prod api can reach Appwrite (http://appwrite/v1) and nginx can proxy
# db.guildmark.co → appwrite-traefik. Created by deploy.sh / deploy.cmd.
networks:
  guildmark-net:
    name: guildmark-net
    external: true
