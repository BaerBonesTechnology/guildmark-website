name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/guildmark-devdash:latest
            ${{ secrets.DOCKER_USERNAME }}/guildmark-devdash:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.guildmark.co

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/guildmark-devdash:latest
            docker stop guildmark-devdash || true
            docker rm   guildmark-devdash || true
            docker run -d \
              --name guildmark-devdash \
              --restart unless-stopped \
              -p 3001:80 \
              ${{ secrets.DOCKER_USERNAME }}/guildmark-devdash:latest
