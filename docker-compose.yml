# GuildMark — full-stack Docker Compose
# ---------------------------------------------------------------------------
# Quick-start:
#   docker compose up                       # all services (prod-like)
#   docker compose up postgres api          # API + DB only
#   docker compose --profile ml up          # include optional ML service
#   docker compose build --no-cache         # force-rebuild all images
#
# Env vars are read from .env (copy .env.example to get started).
# VITE_* build args are baked into the frontend JS bundles at build time —
# rebuild the image if you change them: docker compose build guildmark devdash
#
# Networking:
#   All services communicate over the internal Docker network.
#   Only the nginx reverse proxy exposes a public port (80).
#   Cloudflare sits in front of nginx and handles TLS.
# ---------------------------------------------------------------------------

services:

  # ── Postgres ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - guildmark-net

  # ── Dart Frog API ─────────────────────────────────────────────────────────
  api:
    build:
      context:    ./api/bin
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_PORT:                ${API_PORT:-8080}
      DATABASE_URL:            ${DATABASE_URL}
      JWT_ACCESS_SECRET:       ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL_SECONDS:  ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      # Point at the compose ML service; falls back to empty (API degrades gracefully).
      ML_SERVICE_URL:          ${ML_SERVICE_URL:-http://ml:8001}
      CORS_ORIGIN:             ${CORS_ORIGIN:-http://localhost:3000}
      GM_DEBUG:                ${GM_DEBUG:-false}
      SQUARE_ACCESS_TOKEN:     ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_LOCATION_ID:      ${SQUARE_LOCATION_ID:-}
      SQUARE_ENVIRONMENT:      ${SQUARE_ENVIRONMENT:-sandbox}
      GM_WALLET_ACH_ROUTING:   ${GM_WALLET_ACH_ROUTING:-}
      GM_WALLET_ACH_ACCOUNT:   ${GM_WALLET_ACH_ACCOUNT:-}
      JAMF_PRO_CLIENT_ID:      ${JAMF_PRO_CLIENT_ID:-}
      JAMF_PRO_CLIENT_SECRET:  ${JAMF_PRO_CLIENT_SECRET:-}
      INTUNE_TENANT_ID:        ${INTUNE_TENANT_ID:-}
      INTUNE_CLIENT_ID:        ${INTUNE_CLIENT_ID:-}
      INTUNE_CLIENT_SECRET:    ${INTUNE_CLIENT_SECRET:-}
      EBAY_APP_ID:             ${EBAY_APP_ID:-}
      EBAY_CERT_ID:            ${EBAY_CERT_ID:-}
      EBAY_DEV_ID:             ${EBAY_DEV_ID:-}
      BACKMARKET_API_KEY:      ${BACKMARKET_API_KEY:-}
      RESEND_API_KEY:          ${RESEND_API_KEY:-}
      ESCROW_API_KEY:          ${ESCROW_API_KEY:-}
      ESCROW_EMAIL:            ${ESCROW_EMAIL:-}
      ESCROW_ENVIRONMENT:      ${ESCROW_ENVIRONMENT:-sandbox}
      FEDEX_CLIENT_ID:         ${FEDEX_CLIENT_ID:-}
      FEDEX_CLIENT_SECRET:     ${FEDEX_CLIENT_SECRET:-}
      FEDEX_WEBHOOK_SECRET:    ${FEDEX_WEBHOOK_SECRET:-}
      FEDEX_ENVIRONMENT:       ${FEDEX_ENVIRONMENT:-sandbox}
      ADMIN_AUTH_USER:         ${ADMIN_AUTH_USER:-}
      ADMIN_AUTH_PASS:         ${ADMIN_AUTH_PASS:-}
      ADMIN_CORS_ORIGIN:       ${ADMIN_CORS_ORIGIN:-}
    volumes:
      # Migrations live outside the build context (./api/bin) so they are
      # mounted at runtime.  MigrationRunner defaults to "../migrations"
      # relative to CWD (/app/bin), which resolves to /app/migrations here.
      - ./api/migrations:/app/migrations:ro
    networks:
      - guildmark-net
    # Port not exposed publicly — nginx proxies to api:8080 internally.

  # ── Python ML service (optional — opt-in with --profile ml) ──────────────
  ml:
    build: ./ml-qv
    profiles: ["ml"]
    restart: unless-stopped
    environment:
      ML_PORT:      ${ML_PORT:-8001}
      ML_MODEL_DIR: /app/model_artifacts
      # eBay credentials — used by train_valuation at startup to fetch real
      # market prices. If absent, training falls back to synthetic data only.
      EBAY_APP_ID:          ${EBAY_APP_ID:-}
      EBAY_CERT_ID:         ${EBAY_CERT_ID:-}
      # Amazon PA API — disabled for now (retail price reference overlay)
      # AMAZON_ACCESS_KEY:    ${AMAZON_ACCESS_KEY:-}
      # AMAZON_SECRET_KEY:    ${AMAZON_SECRET_KEY:-}
      # AMAZON_ASSOCIATE_TAG: ${AMAZON_ASSOCIATE_TAG:-}
      # Set RETRAIN=1 to force re-training even if artifacts already exist.
      RETRAIN:              ${RETRAIN:-0}
    volumes:
      - ./ml-qv/model_artifacts:/app/model_artifacts
    networks:
      - guildmark-net
    healthcheck:
      # start_period covers the training pass on first boot.
      test:         ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval:     30s
      timeout:      10s
      retries:      10
      start_period: 120s
    # Port not exposed publicly — nginx proxies to ml:8001 internally.

  # ── GuildMark marketplace frontend ───────────────────────────────────────
  guildmark:
    build:
      context:    ./guildmark
      dockerfile: Dockerfile
      args:
        VITE_API_URL:   ${VITE_API_URL:-https://api.guildmark.co}
        VITE_IS_LAUNCH: ${VITE_IS_LAUNCH:-true}
        VITE_IS_DEBUG:  ${VITE_IS_DEBUG:-false}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - guildmark-net
    # Port not exposed publicly — nginx proxies to guildmark:80 internally.

  # ── DevDash admin panel ───────────────────────────────────────────────────
  devdash:
    build:
      context:    ./devdash
      dockerfile: Dockerfile
      args:
        VITE_API_URL:       ${VITE_API_URL:-https://api.guildmark.co}
        ADMIN_VITE_API_URL: ${ADMIN_VITE_API_URL:-https://api.guildmark.co}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - guildmark-net
    ports:
      - "${DEVDASH_PORT:-3001}:80"

  # ── NGINX reverse proxy ───────────────────────────────────────────────────
  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - guildmark
      - devdash
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"    # API (prod)        → localhost:8080
      - "3001:3001"    # DevDash (prod)    → localhost:3001
      - "8001:8001"    # ML (prod)         → localhost:8001 (only with --profile ml)
      - "9080:9080"    # API (staging)     → localhost:9080
      - "4001:4001"    # DevDash (staging) → localhost:4001
      - "9001:9001"    # ML (staging)      → localhost:9001 (only with --profile ml-stg)
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - guildmark-net

  # All other services also join guildmark-net so nginx can reach staging
  # containers started by docker-compose.staging.yml on the same network.

volumes:
  postgres_data:

networks:
  guildmark-net:
    name: guildmark-net   # fixed name — no project-name prefix
