name: guildmark_api
description: GuildMark Dart Frog HTTP API. Auth, marketplace, AMPS, MDM.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  base32: ^2.2.0
  bcrypt: ^1.1.3      # Password hashing.
  crypto: ^3.0.3      # SHA-256 for refresh-token hashing.
  cryptography: ^2.7.0      # AES-GCM for MDM credential encryption.
  dart_appwrite: ^25.1.0  # Appwrite server-side SDK (storage, realtime signals).
  dart_frog: ^1.1.0
  dart_jsonwebtoken: ^3.4.1     # JWT issue + verify.
  dartz: ^0.10.1      # Functional programming utilities (Either, Option, etc).
  dotenv: ^4.2.0
  freezed_annotation: ^3.1.0
  http: ^1.2.0      # Calls to Python ML service.
  intl: ^0.20.2
  json_annotation: ^4.8.0
  otp: ^3.2.0
  postgres: ^3.3.0      # Native protocol Postgres client.
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.2.5
  json_serializable: ^6.5.0
  mocktail: ^1.0.0
  test: ^1.25.0
