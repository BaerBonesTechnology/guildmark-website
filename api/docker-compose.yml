# GuildMark — AstechServer local dev stack
# Run:    docker-compose up -d postgres      (Dart only, no ML)
# Run:    docker-compose up -d postgres ml   (with ML service)
# Or all: docker-compose up

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-guildmark}
      POSTGRES_USER:     ${POSTGRES_USER:-guildmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gu1dm4rk_p@ssw0rd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guildmark}"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ML service is optional — omit from `depends_on` so the API starts without it.
  ml:
    build:   ./py
    restart: unless-stopped
    environment:
      ML_PORT:       ${ML_PORT:-8001}
      ML_MODEL_DIR:  /app/model_artifacts
    ports:
      - "${ML_PORT:-8001}:8001"
    volumes:
      - ./py/model_artifacts:/app/model_artifacts
    healthcheck:
      test:     ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout:  5s
      retries:  5

  api:
    build:   ./bin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # ML removed from required deps — API degrades gracefully without it.
    environment:
      API_PORT:                  ${API_PORT:-8080}
      DATABASE_URL:              postgres://${POSTGRES_USER:-guildmark}:${POSTGRES_PASSWORD:-gu1dm4rk_p@ssw0rd}@postgres:5432/${POSTGRES_DB:-guildmark}
      JWT_ACCESS_SECRET:         ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:        ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL_SECONDS:    ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS:   ${JWT_REFRESH_TTL_SECONDS:-2592000}
      ML_SERVICE_URL:            ${ML_SERVICE_URL:-}
      CORS_ORIGIN:               ${CORS_ORIGIN:-http://localhost:5173}
      GM_DEBUG:                  ${GM_DEBUG:-false}
      SQUARE_ACCESS_TOKEN:       ${SQUARE_ACCESS_TOKEN}
      SQUARE_LOCATION_ID:        ${SQUARE_LOCATION_ID}
      SQUARE_ENVIRONMENT:        ${SQUARE_ENVIRONMENT:-sandbox}
      GM_WALLET_ACH_ROUTING:     ${GM_WALLET_ACH_ROUTING}
      GM_WALLET_ACH_ACCOUNT:     ${GM_WALLET_ACH_ACCOUNT}
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  postgres_data:
