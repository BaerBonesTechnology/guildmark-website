name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Push Docker → Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/guildmark-api:latest
            ${{ secrets.DOCKER_USERNAME }}/guildmark-api:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/guildmark-api:latest
            docker stop guildmark-api || true
            docker rm   guildmark-api || true
            docker run -d \
              --name guildmark-api \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /opt/guildmark/.env \
              ${{ secrets.DOCKER_USERNAME }}/guildmark-api:latest
