name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/guildmark-ml:latest
            ${{ secrets.DOCKER_USERNAME }}/guildmark-ml:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/guildmark-ml:latest
            docker stop guildmark-ml || true
            docker rm   guildmark-ml || true
            docker run -d \
              --name guildmark-ml \
              --restart unless-stopped \
              -p 8001:8001 \
              -v /opt/guildmark/model_artifacts:/app/model_artifacts \
              ${{ secrets.DOCKER_USERNAME }}/guildmark-ml:latest
